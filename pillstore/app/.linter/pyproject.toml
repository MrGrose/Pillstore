[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"
flake8 = "6.0.*"
flake8-cognitive-complexity = "0.1.*"
flake8-commas = "2.1.*"
flake8-builtins = "2.0.*"
flake8-docstrings = "1.6.*"
flake8-pyproject = "1.2.*"
flake8-bugbear = "23.5.*"
pep8-naming = "0.13.*"
flake8-import-order = "^0.18.2"
ruff = "^0.6.0"

[tool.flake8]
ignore = [
    'D100',
    'D101',
    'D102',
    'D103',
    'D104',
    'D105',
    'D106',
    'D107',
    'W503',  # conflicts with W504 https://github.com/mila-iqia/cookiecutter-pyml/issues/10
]
max-line-length = 120
max-complexity = 7
exclude = "migrations"  # exclude autogenerated Django migrations
count = true

# import order config
import-order-style = 'edited'
application-import-names = [
    'project',
    'crm',
    'auth',
    'bank_guarantee_deals',
    'gosbase_api',
    'dadata_api',
    'bank_details',
    'bank_guarantee_providers_and_channels',
    'notes',
    'django_scout',
    'file_storage',
    'event_feed',
]
