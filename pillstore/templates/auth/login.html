<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Вход - PillStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
{% if request.query_params.error %}
<div class="alert alert-danger">Неверный email или пароль!</div>
{% endif %}
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card mt-5">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Вход</h3>
                        <form method="post" action="/auth/login">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <button class="btn btn-primary w-100">Войти</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/auth/register" class="text-muted">Регистрация</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
