{% extends "base.html" %}
{% block title %}Вход - PillStore{% endblock %}
{% block content %}
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card mt-5">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Вход</h3>
                        <form method="post" action="/auth/login">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input 
                                    type="email" 
                                    name="email" 
                                    class="form-control {% if errors and errors.get('email') %}is-invalid{% endif %}" 
                                    value="{{ email|default('') }}"
                                    required
                                >
                                {% if errors and errors.get('email') %}
                                <div class="invalid-feedback">
                                    {{ errors.email }}
                                </div>
                                {% endif %}
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input 
                                    type="password" 
                                    name="password" 
                                    class="form-control {% if errors and errors.get('password') %}is-invalid{% endif %}" 
                                    required
                                >
                                {% if errors and errors.get('password') %}
                                <div class="invalid-feedback">
                                    {{ errors.password }}
                                </div>
                                {% endif %}
                            </div>
                            <button class="btn btn-primary w-100">Войти</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/auth/register" class="text-muted">Регистрация</a>
                            <span class="mx-2">|</span>
                            <a href="/auth/reset-password" class="text-muted">Забыли пароль?</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
{% endblock %}
