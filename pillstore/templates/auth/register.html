{% extends "base.html" %}
{% block title %}Регистрация - PillStore{% endblock %}
{% block content %}
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card mt-5">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Регистрация</h3>
                        <form method="post" action="/auth/register">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input 
                                    type="email" 
                                    name="email" 
                                    class="form-control {{ 'is-invalid' if errors and 'email' in errors else '' }}" 
                                    value="{{ email|default('') }}"
                                    required
                                >
                                {% if errors and 'email' in errors %}
                                <div class="invalid-feedback d-block">
                                    {{ errors.email }}
                                </div>
                                {% endif %}
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input 
                                    type="password" 
                                    name="password" 
                                    class="form-control {{ 'is-invalid' if errors and 'password' in errors else '' }}" 
                                    required
                                >
                                {% if errors and 'password' in errors %}
                                <div class="invalid-feedback d-block">
                                    {{ errors.password }}
                                </div>
                                {% endif %}
                            </div>
                            <button class="btn btn-primary w-100">Зарегистрироваться</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/auth/" class="text-muted">Вход</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
{% endblock %}
