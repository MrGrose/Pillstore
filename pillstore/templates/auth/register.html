<!DOCTYPE html>
<html>
<head>
    <title>Регистрация - PillStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .auto-hide {
            animation: slideOut 4s forwards;
        }
        @keyframes slideOut {
            0% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); max-height: 0; }
        }
        
        /* Сброс при фокусе на форму */
        .alert-container:focus-within .auto-hide {
            animation: none;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4">Регистрация</h4>
                        
                        <div class="alert-container" tabindex="-1">
                            {% if errors %}
                                {% for error in errors %}
                                    <div class="alert alert-danger auto-hide mb-3" role="alert">
                                        {{ error }}
                                        <button type="button" class="btn-close" onclick="this.parentElement.style.display='none'"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                            
                            {% if msg %}
                                <div class="alert alert-success auto-hide mb-3" role="alert">
                                    {{ msg }}
                                    <button type="button" class="btn-close" onclick="this.parentElement.style.display='none'"></button>
                                </div>
                            {% endif %}
                        </div>

                        <form method="post" action="/auth/register?clear=1">
                            <div class="mb-3">
                                <input type="email" name="email" class="form-control" placeholder="Email" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" name="password" class="form-control" placeholder="Пароль" minlength="6" required>
                            </div>
                            <div class="mb-3">
                                <select name="role" class="form-select">
                                    <option value="buyer">Покупатель</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                        </form>

                        <div class="text-center mt-3">
                            <p>Уже есть аккаунт? <a href="/auth/">Войти</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
