{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow">
                <div class="card-body text-center p-5">
                    <i class="fas fa-exclamation-triangle fa-3x text-danger mb-4"></i>
                    <h1 class="display-4 fw-bold text-danger mb-3">{{ code }}</h1>
                    <h2 class="h3 mb-4">{{ title }}</h2>
                    <p class="text-muted fs-5">{{ message }}</p>
                    <a href="/admin?tab={{ tab }}" class="btn btn-primary btn-lg">
                        <i class="fas fa-arrow-left me-2"></i>В админку
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
