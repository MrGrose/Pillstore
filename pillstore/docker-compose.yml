version: '3.8'

services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    container_name: pillstore-db
    restart: always
    ports:
      - "5434:5432"
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    container_name: pillstore-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./static:/app/static
      - ./media:/app/media
      - ./app/tests_data:/app/tests_data
      - ./app:/app/app
      - ./templates:/app/templates
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

volumes:
  db:


networks:
  app:
    driver: bridge
